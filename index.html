<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#7c3aed">
<link rel="manifest" href="manifest.json">
<title>AlgoCards</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/java.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f1a;--card:#1a1a2e;--card2:#252540;--purple:#7c3aed;--green:#22c55e;--orange:#f59e0b;--red:#ef4444;--text:#e2e8f0;--dim:#94a3b8;--radius:16px}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px;padding-top:env(safe-area-inset-top,16px);-webkit-user-select:none;user-select:none}
h1{font-size:26px;margin:8px 0 4px;text-align:center}
.subtitle{text-align:center;color:var(--dim);font-size:13px;margin-bottom:14px}
.flashcard{background:var(--card);border-radius:20px;padding:24px;margin:12px 0;cursor:pointer}
.fc-face{display:none}
.fc-face.visible{display:block}
.fc-nav{display:flex;justify-content:center;gap:24px;margin-top:12px}
.fc-nav button{background:var(--card);border:none;color:var(--purple);width:52px;height:52px;border-radius:50%;font-size:22px;cursor:pointer;transition:transform .1s}
.fc-nav button:active{transform:scale(.9)}
.counter{text-align:center;color:var(--dim);font-size:13px;margin:8px 0}
.tag{display:inline-block;font-size:11px;padding:3px 8px;border-radius:8px;font-weight:600}
.filter-row{display:flex;gap:8px;overflow-x:auto;padding:4px 0 12px;-webkit-overflow-scrolling:touch}
#search{width:100%;padding:10px 14px;border-radius:12px;border:1px solid #ffffff15;background:var(--card);color:var(--text);font-size:15px;outline:none;margin-bottom:8px}
#search::placeholder{color:var(--dim)}
#search:focus{border-color:var(--purple)}
.spoiler-row{margin-top:12px}
.hint-btn{background:var(--card2);border:none;color:var(--orange);padding:8px 16px;border-radius:10px;font-size:13px;cursor:pointer;display:inline-block}
.steps-btn{color:var(--green)}
.hint-text{margin-top:8px;color:var(--orange);font-size:14px;font-weight:600}
.steps-text{margin-top:8px;color:var(--green);font-size:13px;line-height:1.7;white-space:pre-wrap}
.hl{color:var(--orange);font-weight:600;background:rgba(245,158,11,0.15);padding:1px 4px;border-radius:4px}
.filter-btn{background:var(--card);border:1px solid #ffffff15;color:var(--dim);padding:6px 12px;border-radius:20px;font-size:12px;white-space:nowrap;cursor:pointer;transition:.2s}
.filter-btn.active{background:var(--purple);color:#fff;border-color:var(--purple)}
pre code.hljs{background:var(--card2);padding:12px;border-radius:10px}
.code-wrap{position:relative;margin-top:10px}
.copy-btn{position:absolute;top:8px;right:8px;background:var(--card);border:1px solid #ffffff20;color:var(--dim);padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;z-index:1;transition:.2s}
.copy-btn:active{background:var(--purple);color:#fff}
.edit-toggle{position:fixed;bottom:20px;right:20px;background:var(--card2);border:1px solid #ffffff20;color:var(--dim);width:44px;height:44px;border-radius:50%;font-size:18px;cursor:pointer;z-index:100;display:flex;align-items:center;justify-content:center;transition:.2s}
.edit-toggle.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.edit-field{width:100%;background:var(--card2);color:var(--text);border:1px solid #ffffff20;border-radius:8px;padding:8px;font-size:13px;font-family:monospace;resize:vertical;line-height:1.5;margin-top:6px}
.edit-field:focus{border-color:var(--purple);outline:none}
.edit-label{font-size:11px;color:var(--dim);margin-top:10px;text-transform:uppercase;letter-spacing:.5px}
.edit-save{background:var(--green);color:#000;border:none;padding:10px 24px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:14px;width:100%}
.edit-save:disabled{opacity:.5;cursor:not-allowed}
.edit-status{text-align:center;font-size:12px;margin-top:8px;min-height:18px}
.token-modal{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.token-box{background:var(--card);border-radius:16px;padding:24px;max-width:360px;width:100%}
.token-box h3{margin-bottom:12px;font-size:16px}
.token-box p{font-size:13px;color:var(--dim);margin-bottom:12px;line-height:1.5}
.token-box input{width:100%;padding:10px;border-radius:8px;border:1px solid #ffffff20;background:var(--card2);color:var(--text);font-size:14px;font-family:monospace}
.token-box input:focus{border-color:var(--purple);outline:none}
.token-btns{display:flex;gap:8px;margin-top:14px}
.token-btns button{flex:1;padding:10px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer}
.token-ok{background:var(--purple);color:#fff}
.token-cancel{background:var(--card2);color:var(--dim)}
</style>
</head>
<body>

<h1>AlgoCards</h1>
<div class="subtitle" id="info"></div>
<input type="text" id="search" placeholder="Поиск по условию..." oninput="applySearch()">
<div class="filter-row" id="filters"></div>
<div id="cardsArea"></div>
<button class="edit-toggle" id="editToggle" onclick="toggleEdit()" title="Редактирование">✏️</button>
<div id="tokenModal" class="token-modal" style="display:none"></div>

<script src="problems.js" charset="UTF-8"></script>
<script>
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/==([^=]+)==/g,'<span class="hl">$1</span>')}
function escCode(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

// --- «14 задач на сегодня» (без поиска) ---
// Из текущего набора (все задачи или выбранный паттерн) каждый календарный день показываем не больше DAILY_LIMIT карточек.
// Состав и порядок детерминированы от строки seed (дата + фильтр), чтобы за день список не менялся между перезагрузками.
// Поиск не ограничиваем — при непустой строке поиска показываются все совпадения из getFiltered().

const DAILY_LIMIT=14;
/** Дата (YYYY-MM-DD), для которой уже собран fcList; если наступил новый день — пересобираем список в renderCard */
let dailyListDateKey='';

/** Локальная календарная дата устройства — ключ «какой сегодня день» для дневной выборки */
function todayLocalDateKey(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

/** FNV-1a: превращаем строку seed в стартовое число для PRNG */
function hashString(s){
  let h=2166136261>>>0;
  for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)>>>0}
  return h>>>0;
}

/** Детерминированный генератор [0,1) — нужен для воспроизводимого «перемешивания» по дню */
function mulberry32(seed){
  return function(){
    let t=(seed+=0x6D2B79F5)>>>0;
    t=Math.imul(t^t>>>15,t|1);
    t^=t+Math.imul(t^t>>>7,t|61);
    return ((t^t>>>14)>>>0)/4294967296;
  };
}

/**
 * Берёт из list до maxN задач: Fisher–Yates с PRNG от seedStr.
 * seedStr обычно «дата|all» или «дата|Two Pointers» — отдельная выборка на каждый паттерн в тот же день.
 */
function pickDailyProblems(list,seedStr,maxN){
  if(!list.length)return[];
  const n=Math.min(maxN,list.length);
  const rand=mulberry32(hashString(seedStr));
  const idx=[...Array(list.length).keys()];
  for(let i=idx.length-1;i>0;i--){
    const j=Math.floor(rand()*(i+1));
    const t=idx[i];idx[i]=idx[j];idx[j]=t;
  }
  return idx.slice(0,n).map(i=>list[i]);
}

/** Заполняет fcList дневной порцией. Имеет смысл только при пустом поиске: тогда getFiltered() даёт все задачи или только выбранный паттерн. */
function rebuildDailyList(){
  const k=todayLocalDateKey();
  dailyListDateKey=k;
  fcList=pickDailyProblems(getFiltered(),k+'|'+(activeFilter||'all'),DAILY_LIMIT);
}

const REPO='tantarin/algocards';
const FILE_PATH='problems.js';
const allPatterns=[...new Set(P.map(p=>p.p))].sort();
let activeFilter=null;
let searchQuery='';
let fcIdx=0,fcFlipped=false,fcList=[];
let editMode=false;

function getToken(){return localStorage.getItem('gh_token')}
function setToken(t){localStorage.setItem('gh_token',t)}

function toggleEdit(){
  if(!editMode){
    const token=getToken();
    if(!token){showTokenModal();return}
    editMode=true;
    document.getElementById('editToggle').classList.add('active');
    renderCard();
  } else {
    editMode=false;
    document.getElementById('editToggle').classList.remove('active');
    renderCard();
  }
}

function showTokenModal(){
  const m=document.getElementById('tokenModal');
  m.style.display='flex';
  m.innerHTML=`<div class="token-box">
    <h3>🔑 GitHub Token</h3>
    <p>Нужен Personal Access Token с правом <b>repo</b> для пуша изменений.<br>
    <a href="https://github.com/settings/tokens/new?scopes=repo&description=AlgoCards" target="_blank" style="color:var(--purple)">Создать токен →</a></p>
    <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx">
    <div class="token-btns">
      <button class="token-cancel" onclick="closeTokenModal()">Отмена</button>
      <button class="token-ok" onclick="saveToken()">Сохранить</button>
    </div>
  </div>`;
  setTimeout(()=>document.getElementById('tokenInput').focus(),100);
}

function closeTokenModal(){document.getElementById('tokenModal').style.display='none'}

function saveToken(){
  const v=document.getElementById('tokenInput').value.trim();
  if(!v)return;
  setToken(v);
  closeTokenModal();
  editMode=true;
  document.getElementById('editToggle').classList.add('active');
  renderCard();
}

function getFiltered(){
  let list=activeFilter?P.filter(p=>p.p===activeFilter):[...P];
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    list=list.filter(p=>(p.t+' '+p.desc+' '+p.hint+' '+p.p).toLowerCase().includes(q));
  }
  return list;
}

function applySearch(){
  searchQuery=document.getElementById('search').value.trim();
  // С поиском — полный список совпадений; без поиска — снова лимит «на сегодня»
  if(searchQuery)fcList=getFiltered();
  else rebuildDailyList();
  fcIdx=0;fcFlipped=false;
  renderCard();
}

function renderFilters(){
  document.getElementById('filters').innerHTML=
    `<div class="filter-btn${!activeFilter?' active':''}" onclick="setFilter(null)">Все</div>`+
    allPatterns.map(p=>`<div class="filter-btn${activeFilter===p?' active':''}" onclick="setFilter('${p}')">${p}</div>`).join('');
}

function setFilter(pat){
  activeFilter=pat;
  renderFilters();
  // При активном поиске фильтр только сужает выдачу поиска; иначе — новая дневная 14 из выбранного паттерна
  if(searchQuery)fcList=getFiltered();
  else rebuildDailyList();
  fcIdx=0;fcFlipped=false;
  renderCard();
}

const EDIT_FIELDS=[
  {key:'t',label:'Название'},
  {key:'desc',label:'Условие',rows:8},
  {key:'hint',label:'Подсказка',rows:2},
  {key:'steps',label:'Схема решения',rows:4},
  {key:'code',label:'Код (Java)',rows:12},
  {key:'complexity',label:'Сложность',rows:1},
  {key:'complexityExpl',label:'Объяснение сложности',rows:2},
  {key:'expl',label:'Объяснение алгоритма',rows:3}
];

function renderEditCard(){
  const p=fcList[fcIdx];
  let fields=EDIT_FIELDS.map(f=>`
    <div class="edit-label">${f.label}</div>
    <textarea class="edit-field" data-key="${f.key}" rows="${f.rows||3}">${p[f.key]||''}</textarea>
  `).join('');

  document.getElementById('cardsArea').innerHTML=`
    <div class="counter">${fcIdx+1} / ${fcList.length}</div>
    <div class="flashcard" style="cursor:default">
      <span class="tag" style="background:#7c3aed30;color:#7c3aed">${esc(p.p)}</span>
      <span class="tag" style="background:#22c55e30;color:#22c55e;margin-left:4px">${esc(p.d)}</span>
      ${fields}
      <button class="edit-save" id="saveBtn" onclick="saveCard()">💾 Сохранить и запушить</button>
      <div class="edit-status" id="editStatus"></div>
    </div>
    <div class="fc-nav">
      <button onclick="fcPrev()">←</button>
      <button onclick="fcShuffle()">🔀</button>
      <button onclick="fcNext()">→</button>
    </div>`;
}

function renderCard(){
  // Вкладка открыта через полночь: обновляем дневной набор (только в обычном режиме, не в поиске)
  if(!searchQuery){
    const k=todayLocalDateKey();
    if(dailyListDateKey!==k){
      rebuildDailyList();
      fcIdx=0;fcFlipped=false;
    }
  }
  const totalFiltered=getFiltered().length;
  let infoText=fcList.length+' задач';
  // Подсказка под заголовком: «на сегодня» только когда реально действует лимит DAILY_LIMIT
  if(!searchQuery&&totalFiltered>DAILY_LIMIT)infoText+=' на сегодня';
  else if(searchQuery)infoText+=' по поиску';
  document.getElementById('info').textContent=infoText;
  if(!fcList.length){document.getElementById('cardsArea').innerHTML='<p style="text-align:center;color:var(--dim)">Нет задач</p>';return;}
  if(editMode){renderEditCard();return}
  const p=fcList[fcIdx];
  document.getElementById('cardsArea').innerHTML=`
    <div class="counter">${fcIdx+1} / ${fcList.length}</div>
    <div class="flashcard" onclick="flipCard()">
      <div class="fc-face${!fcFlipped?' visible':''}">
        <span class="tag" style="background:#7c3aed30;color:#7c3aed">${esc(p.d)}</span>
        <h3 style="margin:12px 0;font-size:17px"><span style="color:var(--dim)">#${P.indexOf(p)+1}</span> ${esc(p.t)}</h3>
        <div class="code-wrap" style="margin-top:4px">
          <button class="copy-btn" onclick="event.stopPropagation();copyDesc(this)">Скопировать</button>
          <div class="desc-copy-body" style="white-space:pre-wrap;font-size:14px;line-height:1.6;padding-top:32px">${esc(p.desc)}</div>
        </div>
        <div class="spoiler-row">
          <button class="hint-btn" onclick="event.stopPropagation();this.nextElementSibling.style.display='block';this.style.display='none'">💡 Подсказка</button>
          <div class="hint-text" style="display:none">${esc(p.hint)}</div>
        </div>
        ${p.steps?`<div class="spoiler-row">
          <button class="hint-btn steps-btn" onclick="event.stopPropagation();this.nextElementSibling.style.display='block';this.style.display='none'">🔢 Схема решения</button>
          <div class="steps-text" style="display:none">${esc(p.steps)}</div>
        </div>`:''}
        <div style="text-align:center;color:var(--dim);margin-top:16px;font-size:13px">нажми чтобы перевернуть →</div>
      </div>
      <div class="fc-face${fcFlipped?' visible':''}">
        <span class="tag" style="background:#7c3aed30;color:#7c3aed">${esc(p.p)}</span>
        <div class="code-wrap">
          <button class="copy-btn" onclick="event.stopPropagation();copyCode(this)">Копировать</button>
          <pre style="border-radius:10px;overflow:hidden"><code class="language-java" style="font-size:11px;line-height:1.5">${escCode(p.code)}</code></pre>
        </div>
        ${p.complexity?`<div style="margin-top:12px;padding:10px 14px;background:var(--card2);border-radius:10px;font-size:13px;line-height:1.6">
          <div style="color:#7c3aed;font-weight:600;margin-bottom:4px">${esc(p.complexity)}</div>
          ${p.complexityExpl?`<div style="color:var(--dim)">${esc(p.complexityExpl)}</div>`:''}
        </div>`:''}
        <div style="margin-top:10px;font-size:13px;color:var(--dim);white-space:pre-wrap">${esc(p.expl)}</div>
      </div>
    </div>
    <div class="fc-nav">
      <button onclick="fcPrev()">←</button>
      <button onclick="fcShuffle()">🔀</button>
      <button onclick="fcNext()">→</button>
    </div>`;
  document.querySelectorAll('pre code').forEach(el=>hljs.highlightElement(el));
}

function copyCode(btn){
  const code=btn.parentElement.querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(()=>{
    btn.textContent='Скопировано ✓';
    btn.style.background='var(--green)';
    btn.style.color='#000';
    setTimeout(()=>{btn.textContent='Копировать';btn.style.background='';btn.style.color=''},1500);
  }).catch(()=>{btn.textContent='Ошибка'});
}

function copyDesc(btn){
  const body=btn.parentElement.querySelector('.desc-copy-body');
  const text=body?body.innerText:'';
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='Скопировано ✓';
    btn.style.background='var(--green)';
    btn.style.color='#000';
    setTimeout(()=>{btn.textContent='Скопировать';btn.style.background='';btn.style.color=''},1500);
  }).catch(()=>{btn.textContent='Ошибка'});
}

function flipCard(){fcFlipped=!fcFlipped;renderCard()}
function fcNext(){fcFlipped=false;fcIdx=(fcIdx+1)%fcList.length;renderCard()}
function fcPrev(){fcFlipped=false;fcIdx=(fcIdx-1+fcList.length)%fcList.length;renderCard()}
function fcShuffle(){
  fcFlipped=false;
  // В дневном режиме перемешиваем только сегодняшние карточки; при поиске — весь отфильтрованный список
  if(searchQuery)fcList=shuffle(getFiltered());
  else fcList=shuffle(fcList.slice());
  fcIdx=0;renderCard();
}

function buildProblemsJs(){
  const escVal=s=>{
    if(s==null)return '';
    return s.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');
  };
  let out='const P = [\n';
  let prevPat='';
  P.forEach((p,i)=>{
    if(p.p!==prevPat){
      out+='// ===== '+p.p.toUpperCase()+' =====\n';
      prevPat=p.p;
    }
    out+='{id:"'+p.id+'",t:"'+p.t.replace(/"/g,'\\"')+'",p:"'+p.p.replace(/"/g,'\\"')+'",d:"'+p.d.replace(/"/g,'\\"')+'",\n';
    out+='desc:`'+escVal(p.desc)+'`,\n';
    out+='hint:`'+escVal(p.hint)+'`,\n';
    out+='code:`'+escVal(p.code)+'`,\n';
    out+='steps:`'+escVal(p.steps)+'`,\n';
    out+='complexity:`'+escVal(p.complexity)+'`,\n';
    out+='complexityExpl:`'+escVal(p.complexityExpl)+'`,\n';
    out+='expl:`'+escVal(p.expl)+'`}';
    if(i<P.length-1)out+=',';
    out+='\n\n';
  });
  out+='];\n';
  return out;
}

async function saveCard(){
  const p=fcList[fcIdx];
  const btn=document.getElementById('saveBtn');
  const status=document.getElementById('editStatus');
  
  document.querySelectorAll('.edit-field').forEach(el=>{
    p[el.dataset.key]=el.value;
  });

  btn.disabled=true;
  status.style.color='var(--dim)';
  status.textContent='Генерация файла...';

  const content=buildProblemsJs();
  const encoded=btoa(unescape(encodeURIComponent(content)));
  
  status.textContent='Получение SHA текущего файла...';
  const token=getToken();
  
  try{
    const meta=await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`,{
      headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}
    });
    if(!meta.ok){
      if(meta.status===401){
        status.style.color='var(--red)';
        status.textContent='Неверный токен. Нажмите ✏️ чтобы обновить.';
        localStorage.removeItem('gh_token');
        editMode=false;
        document.getElementById('editToggle').classList.remove('active');
        btn.disabled=false;
        return;
      }
      throw new Error('GitHub API: '+meta.status);
    }
    const metaJson=await meta.json();
    const sha=metaJson.sha;

    status.textContent='Пушим в GitHub...';
    const put=await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`,{
      method:'PUT',
      headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({
        message:'Update '+p.id+': '+p.t,
        content:encoded,
        sha:sha
      })
    });
    
    if(!put.ok){
      const err=await put.json();
      throw new Error(err.message||'PUT failed: '+put.status);
    }
    
    status.style.color='var(--green)';
    status.textContent='✅ Сохранено и запушено!';
    btn.disabled=false;
  }catch(e){
    status.style.color='var(--red)';
    status.textContent='❌ '+e.message;
    btn.disabled=false;
  }
}

renderFilters();
