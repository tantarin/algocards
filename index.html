<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#7c3aed">
<link rel="manifest" href="manifest.json">
<title>AlgoCards</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f1a;--card:#1a1a2e;--card2:#252540;--purple:#7c3aed;--green:#22c55e;--orange:#f59e0b;--text:#e2e8f0;--dim:#94a3b8;--radius:16px}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px;padding-top:env(safe-area-inset-top,16px);-webkit-user-select:none;user-select:none}
h1{font-size:26px;margin:8px 0 4px;text-align:center}
.subtitle{text-align:center;color:var(--dim);font-size:13px;margin-bottom:14px}
.flashcard{background:var(--card);border-radius:20px;padding:24px;margin:12px 0;cursor:pointer}
.fc-face{display:none}
.fc-face.visible{display:block}
.fc-nav{display:flex;justify-content:center;gap:24px;margin-top:12px}
.fc-nav button{background:var(--card);border:none;color:var(--purple);width:52px;height:52px;border-radius:50%;font-size:22px;cursor:pointer;transition:transform .1s}
.fc-nav button:active{transform:scale(.9)}
.counter{text-align:center;color:var(--dim);font-size:13px;margin:8px 0}
.tag{display:inline-block;font-size:11px;padding:3px 8px;border-radius:8px;font-weight:600}
.filter-row{display:flex;gap:8px;overflow-x:auto;padding:4px 0 12px;-webkit-overflow-scrolling:touch}
#search{width:100%;padding:10px 14px;border-radius:12px;border:1px solid #ffffff15;background:var(--card);color:var(--text);font-size:15px;outline:none;margin-bottom:8px}
#search::placeholder{color:var(--dim)}
#search:focus{border-color:var(--purple)}
.filter-btn{background:var(--card);border:1px solid #ffffff15;color:var(--dim);padding:6px 12px;border-radius:20px;font-size:12px;white-space:nowrap;cursor:pointer;transition:.2s}
.filter-btn.active{background:var(--purple);color:#fff;border-color:var(--purple)}
</style>
</head>
<body>

<h1>AlgoCards</h1>
<div class="subtitle" id="info"></div>
<input type="text" id="search" placeholder="Поиск по условию..." oninput="applySearch()">
<div class="filter-row" id="filters"></div>
<div id="cardsArea"></div>

<script src="problems.js"></script>
<script>
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

const allPatterns=[...new Set(P.map(p=>p.p))].sort();
let activeFilter=null;
let searchQuery='';
let fcIdx=0,fcFlipped=false,fcList=[];

function getFiltered(){
  let list=activeFilter?P.filter(p=>p.p===activeFilter):[...P];
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    list=list.filter(p=>(p.t+' '+p.desc).toLowerCase().includes(q));
  }
  return list;
}

function applySearch(){
  searchQuery=document.getElementById('search').value.trim();
  fcList=searchQuery?getFiltered():shuffle(getFiltered());
  fcIdx=0;fcFlipped=false;
  renderCard();
}

function renderFilters(){
  document.getElementById('filters').innerHTML=
    `<div class="filter-btn${!activeFilter?' active':''}" onclick="setFilter(null)">Все</div>`+
    allPatterns.map(p=>`<div class="filter-btn${activeFilter===p?' active':''}" onclick="setFilter('${p}')">${p}</div>`).join('');
}

function setFilter(pat){
  activeFilter=pat;
  renderFilters();
  fcList=shuffle(getFiltered());
  fcIdx=0;fcFlipped=false;
  renderCard();
}

function renderCard(){
  if(!fcList.length){document.getElementById('cardsArea').innerHTML='<p style="text-align:center;color:var(--dim)">Нет задач</p>';return;}
  const p=fcList[fcIdx];
  document.getElementById('info').textContent=fcList.length+' задач';
  document.getElementById('cardsArea').innerHTML=`
    <div class="counter">${fcIdx+1} / ${fcList.length}</div>
    <div class="flashcard" onclick="flipCard()">
      <div class="fc-face${!fcFlipped?' visible':''}">
        <span class="tag" style="background:#7c3aed30;color:#7c3aed">${esc(p.d)}</span>
        <h3 style="margin:12px 0;font-size:17px">${esc(p.t)}</h3>
        <div style="white-space:pre-wrap;font-size:14px;line-height:1.6">${esc(p.desc)}</div>
        <div style="text-align:center;color:var(--dim);margin-top:16px;font-size:13px">нажми чтобы перевернуть →</div>
      </div>
      <div class="fc-face${fcFlipped?' visible':''}">
        <span class="tag" style="background:#7c3aed30;color:#7c3aed">${esc(p.p)}</span>
        <div style="margin:10px 0;color:var(--orange);font-size:14px;white-space:pre-wrap">${esc(p.hint)}</div>
        <pre style="font-size:11px;background:var(--card2);padding:12px;border-radius:10px;overflow-x:auto;line-height:1.5">${esc(p.code)}</pre>
        <div style="margin-top:10px;font-size:13px;color:var(--dim);white-space:pre-wrap">${esc(p.expl)}</div>
      </div>
    </div>
    <div class="fc-nav">
      <button onclick="fcPrev()">←</button>
      <button onclick="fcShuffle()">🔀</button>
      <button onclick="fcNext()">→</button>
    </div>`;
}

function flipCard(){fcFlipped=!fcFlipped;renderCard()}
function fcNext(){fcFlipped=false;fcIdx=(fcIdx+1)%fcList.length;renderCard()}
function fcPrev(){fcFlipped=false;fcIdx=(fcIdx-1+fcList.length)%fcList.length;renderCard()}
function fcShuffle(){fcFlipped=false;fcList=shuffle(getFiltered());fcIdx=0;renderCard()}

renderFilters();
fcList=shuffle(getFiltered());
renderCard();
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
