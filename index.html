<script>
const P=[
{id:"bt1",t:"Generate Parentheses (22)",p:"Backtracking",d:"средне",
desc:`На вход получаем число n.
Необходимо сгенерировать все допустимые комбинации скобок, заданные n парами.

Допустимая комбинация означает:
- Каждой открывающей скобке ( соответствует закрывающая )
- При чтении слева направо количество закрывающих никогда не превышает количество открывающих

Пример:
n = 1 → "()"
n = 2 → "(())", "()()"
n = 3 → "((()))", "(()())", "(())()", "()(())", "()()()"`,
hint:"На каждом шаге добавляем ( или ). Открывающих должно быть больше чем закрывающих. По сути перебирай все варианты, но соблюдай ограничения.",
code:`class Solution {
    private List<String> result = new ArrayList<>();
    private int pairCount;

    public List<String> generateParenthesis(int n) {
        this.pairCount = n;
        backtrack(0, 0, "");
        return result;
    }

    private void backtrack(int openCount, int closeCount,
                           String currentString) {
        // Pruning:
        // 1. Если скобок стало больше чем надо
        // 2. Если закрывающих больше чем открывающих
        if (openCount > pairCount || closeCount > pairCount
            || openCount < closeCount) {
            return;
        }

        // Base case: обе равны n → нашли результат
        if (openCount == pairCount && closeCount == pairCount) {
            result.add(currentString);
            return;
        }

        // Попытка добавить открывающую
        backtrack(openCount + 1, closeCount,
                  currentString + "(");
        // Попытка добавить закрывающую
        backtrack(openCount, closeCount + 1,
                  currentString + ")");
    }
}`,
expl:`Поиск в глубину с отсечением ветвей.
Отслеживаем l (открывающие) и r (закрывающие).
- Не добавляем больше n каждого типа
- r никогда не превышает l
- Когда l == r == n — допустимая комбинация`},

{id:"bs1",t:"Поиск в повернутом массиве (33)",p:"Binary Search",d:"средне",
desc:`Дан целочисленный массив nums, изначально отсортированный по возрастанию, содержащий уникальные значения. Массив мог быть повернут влево в некоторой неизвестной точке k.

Найти заданное target значение и вернуть его индекс. Если не найдено — вернуть -1.

Пример:
Ввод: nums = [4,5,6,7,0,1,2], target = 0
Вывод: 4`,
hint:"Модифицированный бинарный поиск. Определяем какая половина отсортирована, ищем target в ней.",
code:`class Solution {
    public int search(int[] nums, int target) {
        int left = 0;
        int right = nums.length - 1;

        while (left <= right) {
            int mid = left + (right - left) / 2;

            if (nums[mid] == target) {
                return mid;
            }

            // Check which half is sorted
            if (nums[left] <= nums[mid]) {
                // Left half is sorted
                if (nums[left] <= target
                    && target < nums[mid]) {
                    right = mid - 1;
                } else {
                    left = mid + 1;
                }
            } else {
                // Right half is sorted
                if (nums[mid] < target
                    && target <= nums[right]) {
                    left = mid + 1;
                } else {
                    right = mid - 1;
                }
            }
        }
        return -1;
    }
}`,
expl:`O(log n) — пространство поиска уменьшается вдвое на каждой итерации.
O(1) память — только переменные left, right, mid.`},

{id:"gop1",t:"Best Time to Buy and Sell Stock II (122)",p:"Greedy",d:"легко",
desc:`Дан массив prices, где prices[i] — цена акции в день i.
Можно совершать несколько транзакций (покупку и продажу):
- Покупать и продавать в любой день
- Не более одной акции одновременно
- Можно покупать и продавать в один день

Найти максимальную прибыль.

Пример:
Ввод: prices = [1, 3, 2, 5]
- Покупка день 0 (цена 1), продажа день 1 (цена 3): прибыль = 2
- Покупка день 2 (цена 2), продажа день 3 (цена 5): прибыль = 3
- Итого: 5`,
hint:"Жадный подход: всякий раз когда цена растёт — берём прибыль, покупая вчера и продавая сегодня.",
code:`class Solution {
    public int maxProfit(int[] prices) {
        int totalProfit = 0;

        for (int day = 1; day < prices.length; day++) {
            int dailyProfit = prices[day] - prices[day - 1];
            // Берём только положительные разницы
            totalProfit += Math.max(0, dailyProfit);
        }

        return totalProfit;
    }
}`,
expl:`O(n) время, O(1) память. Один проход — суммируем все положительные разности.`},

{id:"hf1",t:"Group Anagrams (49)",p:"HashMap",d:"средне",
desc:`Дан массив строк strs. Сгруппировать все анаграммы вместе.
Анаграммы — слова с одинаковыми символами в разном порядке.

Пример:
Ввод: ["eat","tea","tan","ate","nat","bat"]
Вывод: [["eat","tea","ate"],["tan","nat"],["bat"]]

Порядок групп и строк внутри группы не важен.`,
hint:"HashMap + частотный ключ. Для каждой строки считаем частоту символов и строим ключ.",
code:`class Solution {
    public List<List<String>> groupAnagrams(String[] strs) {
        Map<String, List<String>> map = new HashMap<>();

        for (String s : strs) {
            int[] cnt = new int[26];
            for (int i = 0; i < s.length(); i++) {
                cnt[s.charAt(i) - 'a']++;
            }

            String key = buildKey(cnt);
            map.computeIfAbsent(key,
                k -> new ArrayList<>()).add(s);
        }

        return new ArrayList<>(map.values());
    }

    private String buildKey(int[] cnt) {
        StringBuilder sb = new StringBuilder(26 * 2);
        for (int x : cnt) {
            sb.append('#').append(x);
        }
        return sb.toString();
    }
}`,
expl:`O(n × k) время, O(n × k) память. Все анаграммы дают одинаковый частотный ключ.`},

{id:"hpq1",t:"K наиболее частых элементов (347)",p:"Heap / PQ",d:"средне",
desc:`Дан массив целых чисел nums и число k.
Найти и вернуть k наиболее часто встречающихся элементов.
Гарантируется уникальность ответа.

Пример:
nums = [1,1,1,2,2,3], k = 2
Элемент 1 — 3 раза, 2 — 2 раза, 3 — 1 раз.
Вывод: [1, 2]`,
hint:"Считаем частоту через HashMap, затем min-heap размера k. Если размер > k — удаляем минимальный.",
code:`class Solution {
    public int[] topKFrequent(int[] nums, int k) {
        Map<Integer, Integer> frequencyMap = new HashMap<>();
        for (int num : nums) {
            frequencyMap.merge(num, 1, Integer::sum);
        }

        // Min-heap по частоте
        PriorityQueue<Map.Entry<Integer, Integer>> minHeap =
            new PriorityQueue<>(
                Comparator.comparingInt(Map.Entry::getValue));

        for (Map.Entry<Integer, Integer> entry
             : frequencyMap.entrySet()) {
            minHeap.offer(entry);
            // Если больше k — удаляем самый редкий
            if (minHeap.size() > k) {
                minHeap.poll();
            }
        }

        return minHeap.stream()
            .mapToInt(Map.Entry::getKey)
            .toArray();
    }
}`,
expl:`O(n log k) время, O(k) память для кучи. Min-heap хранит только k самых частых.`},

{id:"iss1",t:"Merge Intervals (56)",p:"Intervals Sweep",d:"средне",
desc:`Дан список отрезков [начало, конец]. Необходимо объединить все пересекающиеся отрезки в более крупные.

Примеры:
- [1,3] и [2,6] перекрываются → [1,6]
- [1,4] и [4,5] перекрываются (общая точка 4) → [1,5]
- [1,2] и [3,4] не перекрываются

Ввод: [[1,3],[2,6],[8,10],[15,18]]
Вывод: [[1,6],[8,10],[15,18]]`,
hint:"Сортируем по началу. Идём слева направо, расширяем текущий интервал или начинаем новый.",
code:`class Solution {
    public int[][] merge(int[][] intervals) {
        // 1) Сортируем по началу
        Arrays.sort(intervals,
            Comparator.comparingInt(a -> a[0]));

        List<int[]> merged = new ArrayList<>();

        int currentStart = intervals[0][0];
        int currentEnd   = intervals[0][1];

        for (int i = 1; i < intervals.length; i++) {
            int nextStart = intervals[i][0];
            int nextEnd   = intervals[i][1];

            if (currentEnd < nextStart) {
                // Нет пересечения — закрываем текущий
                merged.add(
                    new int[]{currentStart, currentEnd});
                currentStart = nextStart;
                currentEnd   = nextEnd;
            } else {
                // Пересечение — расширяем
                currentEnd =
                    Math.max(currentEnd, nextEnd);
            }
        }

        merged.add(new int[]{currentStart, currentEnd});
        return merged.toArray(new int[merged.size()][]);
    }
}`,
expl:`O(n log n) время (сортировка). O(log n) доп. память. Один проход после сортировки.`},

{id:"ll1",t:"Reverse Linked List (206)",p:"Linked List",d:"легко",
desc:`Дан head односвязного списка. Перевернуть весь список и вернуть начало перевернутого.

Пример:
1 → 2 → 3 → 4 → 5
Вывод: 5 → 4 → 3 → 2 → 1`,
hint:"Метод «введения в голову» с фиктивным узлом. На каждом шаге вставляем текущий узел в начало нового списка.",
code:`class Solution {
    public ListNode reverseList(ListNode head) {
        ListNode dummyNode = new ListNode();
        ListNode current = head;

        while (current != null) {
            // Запоминаем следующий узел
            ListNode nextNode = current.next;

            // Вставляем current в начало
            current.next = dummyNode.next;
            dummyNode.next = current;

            // Переходим к следующему
            current = nextNode;
        }

        return dummyNode.next;
    }
}`,
expl:`O(n) время — один проход по списку. O(1) память — только указатели, без доп. структур.`},

{id:"ps1",t:"Subarray Sum Equals K (560)",p:"Prefix Sum",d:"средне",
desc:`Дан массив целых чисел nums и число k.
Найти общее количество подмассивов, сумма которых равна k.
Подмассив — непрерывная последовательность элементов.

Пример:
nums = [1, 2, 3], k = 3
Подмассивы с суммой 3: [1,2] и [3] → ответ 2`,
hint:"Хеш-таблица + префиксные суммы. Если prefixSum в текущей позиции = s, а ранее была s - k, то подмассив между ними = k.",
code:`class Solution {
    public int subarraySum(int[] nums, int k) {
        Map<Integer, Integer> prefixSumCount =
            new HashMap<>();
        // Сумма 0 встречается 1 раз (до начала массива)
        prefixSumCount.put(0, 1);

        int count = 0;
        int currentSum = 0;

        for (int num : nums) {
            currentSum += num;

            // Если (currentSum - k) встречалась ранее,
            // значит есть подмассивы с суммой k
            count += prefixSumCount
                .getOrDefault(currentSum - k, 0);

            prefixSumCount
                .merge(currentSum, 1, Integer::sum);
        }

        return count;
    }
}`,
expl:`O(n) время, O(n) память. Один проход, ищем prefixSum - k в HashMap.`},

{id:"sw1",t:"Minimum Window Substring (76)",p:"Sliding Window",d:"сложно",
desc:`Даны строки s и t. Найти минимальную подстроку s, содержащую все символы t (включая дубликаты).
Если такой подстроки нет — вернуть "".

Пример 1:
s = "ADOBECODEBANC", t = "ABC"
Вывод: "BANC"

Пример 2:
s = "a", t = "a"
Вывод: "a"`,
hint:"Классическое sliding window. Расширяем правую границу пока не покроем все символы t, затем сжимаем левую для минимизации.",
code:`class Solution {
    public String minWindow(String s, String t) {
        if (s == null || t == null
            || s.length() < t.length()) return "";

        // need[c] — сколько символов c ещё нужно
        int[] need = new int[128];
        for (char c : t.toCharArray()) need[c]++;

        int remaining = t.length(); // ещё не покрыто
        int left = 0;
        int bestStart = 0;
        int minLen = Integer.MAX_VALUE;

        for (int right = 0; right < s.length(); right++){
            char rChar = s.charAt(right);
            need[rChar]--;
            if (need[rChar] >= 0) remaining--;

            // Окно содержит ВСЕ символы t
            while (remaining == 0) {
                int windowLen = right - left + 1;
                if (windowLen < minLen) {
                    minLen = windowLen;
                    bestStart = left;
                }
                // Сжимаем слева
                char lChar = s.charAt(left);
                need[lChar]++;
                if (need[lChar] > 0) remaining++;
                left++;
            }
        }

        return minLen == Integer.MAX_VALUE ? ""
            : s.substring(bestStart, bestStart + minLen);
    }
}`,
expl:`O(n) время — каждый указатель проходит строку один раз. O(1) память — фиксированный массив 128.`},

{id:"st1",t:"Valid Parentheses (20)",p:"Stack",d:"легко",
desc:`Дана строка содержащая только скобки: ( ) { } [ ]
Определить, является ли строка допустимой.

Допустимые пары: () [] {}

Примеры:
"()" → true
"()[]{}" → true
"([{}])" → true
"(]" → false
"([)]" → false`,
hint:"Стек (ArrayDeque). Открывающую кладём, при закрывающей — сверяем с вершиной стека.",
code:`class Solution {
    public boolean isValid(String s) {
        Deque<Character> stack = new ArrayDeque<>();

        for (char c : s.toCharArray()) {
            if (c == '(' || c == '{' || c == '[') {
                stack.push(c);
            }
            else if (stack.isEmpty()
                || !isMatchingPair(stack.pop(), c)) {
                return false;
            }
        }

        return stack.isEmpty();
    }

    private boolean isMatchingPair(char open, char close){
        return (open == '(' && close == ')')
            || (open == '{' && close == '}')
            || (open == '[' && close == ']');
    }
}`,
expl:`O(n) время, O(n) память в худшем случае (все открывающие).`},

{id:"tr1",t:"Number of Islands (200)",p:"Trees / DFS",d:"средне",
desc:`Дана карта в виде двумерного массива grid:
1 — суша, 0 — вода.
Определить сколько отдельных островов на карте.
Остров — группа соединённых по вертикали/горизонтали клеток с сушей.

Пример:
grid = [[1,1,0],
        [1,0,0],
        [0,0,1]]
Вывод: 2`,
hint:"DFS flood fill: при нахождении 1 запускаем DFS, который затапливает весь остров (ставит 0).",
code:`public class Solution {
    private static boolean inBound(int i, int j,
            List<List<Integer>> grid) {
        return i >= 0 && i < grid.size()
            && j >= 0 && j < grid.get(0).size();
    }

    private static void dfs(int i, int j,
            List<List<Integer>> grid) {
        if (!inBound(i, j, grid)
            || grid.get(i).get(j) == 0) return;

        grid.get(i).set(j, 0); // затапливаем

        int[][] dirs = {{1,0},{-1,0},{0,1},{0,-1}};
        for (int[] d : dirs) {
            dfs(i + d[0], j + d[1], grid);
        }
    }

    public static int numIslands(
            List<List<Integer>> grid) {
        if (grid.isEmpty()) return 0;
        int count = 0;
        for (int i = 0; i < grid.size(); i++)
            for (int j = 0; j < grid.get(0).size(); j++)
                if (grid.get(i).get(j) == 1) {
                    dfs(i, j, grid);
                    count++;
                }
        return count;
    }
}`,
expl:`DFS flood fill. При нахождении 1 — затапливаем весь остров, +1 к счётчику. O(m×n) время и память.`},

{id:"tp1",t:"Container With Most Water (11)",p:"Two Pointers",d:"средне",
desc:`Дан массив nums, nums[i] — высота линии.
Найти максимальную площадь воды между двумя линиями.
Площадь = min(nums[i], nums[j]) × (j - i)

Пример:
Ввод: nums = [1,8,6,2,5,4,8,3,7]
Вывод: 49
Объяснение: 7 × (8 - 1) = 49`,
hint:"Два указателя с разных концов. Сдвигаем тот, чья высота меньше.",
code:`public class Solution {
    public int maxArea(List<Integer> height) {
        int l = 0;
        int r = height.size() - 1;
        int resultArea = 0;

        while (l < r) {
            int currArea =
                Math.min(height.get(l), height.get(r))
                * (r - l);
            resultArea =
                Math.max(resultArea, currArea);

            if (height.get(l) < height.get(r)) {
                l++;
            } else {
                r--;
            }
        }

        return resultArea;
    }
}`,
expl:`O(n) время, O(1) память. Сдвигаем меньший указатель — сдвиг большего точно не увеличит площадь.`},

{id:"uf1",t:"Объединение графиков",p:"Union-Find",d:"средне",
desc:`Дан массив graphics, где каждый график — список пар [время, значение], отсортированный по времени.
Объединить все графики в один: [время, сумма значений].

Пример:
Ввод: graphics = [[[1,2],[3,1]], [[2,3],[4,2]]]
Вывод: [[1,2],[2,5],[3,4],[4,3]]`,
hint:"Min-heap для событий из всех графиков. Обрабатываем все события с одинаковым временем вместе.",
code:`public class Solution {
    public List<List<Integer>> merge(
            List<List<List<Integer>>> graphics) {
        int k = graphics.size();
        int[] currentValues = new int[k];
        long currentSum = 0;

        // Куча: {время, индекс_графика, индекс_точки}
        PriorityQueue<int[]> heap =
            new PriorityQueue<>(
                Comparator.comparingInt(a -> a[0]));

        for (int i = 0; i < k; i++) {
            var g = graphics.get(i);
            if (g != null && !g.isEmpty())
                heap.offer(new int[]{
                    g.get(0).get(0), i, 0});
        }

        List<List<Integer>> result = new ArrayList<>();

        while (!heap.isEmpty()) {
            int curTime = heap.peek()[0];

            while (!heap.isEmpty()
                   && heap.peek()[0] == curTime) {
                int[] ev = heap.poll();
                int gi = ev[1], pi = ev[2];
                var g = graphics.get(gi);
                int newVal = g.get(pi).get(1);
                int oldVal = currentValues[gi];

                if (newVal != oldVal) {
                    currentValues[gi] = newVal;
                    currentSum +=
                        (long)newVal - oldVal;
                }

                if (pi + 1 < g.size())
                    heap.offer(new int[]{
                        g.get(pi+1).get(0), gi, pi+1});
            }

            result.add(Arrays.asList(
                curTime, (int)currentSum));
        }
        return result;
    }
}`,
expl:`Min-heap обрабатывает события по времени. Все события одного момента — за раз. O(N log k) где N — суммарное число точек.`},

{id:"gbfs1",t:"Кратчайший путь в графе (BFS)",p:"Graph BFS",d:"средне",
desc:`Дан граф как список рёбер edges и две вершины start и end.
Расстояния между вершинами равны 1.
Найти кратчайший путь от start до end.
Вернуть список вершин или пустой список если пути нет.

Пример:
edges = [[1,8],[2,1],[5,1],[3,8],[3,5]], start = 2, end = 5
Вывод: [2,1,5]`,
hint:"BFS (поиск в ширину) + восстановление пути через карту родителей.",
code:`public class Solution {
    public List<Integer> findShortestPath(
            List<List<Integer>> edges,
            Integer start, Integer end) {

        // 1. Строим граф
        Map<Integer, List<Integer>> graph =
            new HashMap<>();
        for (List<Integer> edge : edges) {
            int u = edge.get(0), v = edge.get(1);
            graph.putIfAbsent(u, new ArrayList<>());
            graph.putIfAbsent(v, new ArrayList<>());
            graph.get(u).add(v);
            graph.get(v).add(u);
        }

        // 2. BFS
        Queue<Integer> queue = new LinkedList<>();
        queue.add(start);
        // visited: вершина → родитель
        Map<Integer, Integer> visited =
            new HashMap<>();
        visited.put(start, null);

        while (!queue.isEmpty()) {
            int node = queue.poll();
            if (node == end) break;

            for (int nb : graph.getOrDefault(
                    node, new ArrayList<>())) {
                if (!visited.containsKey(nb)) {
                    visited.put(nb, node);
                    queue.add(nb);
                }
            }
        }

        // 3. Нет пути
        if (!visited.containsKey(end))
            return new ArrayList<>();

        // 4. Восстановление пути
        List<Integer> path = new ArrayList<>();
        Integer cur = end;
        while (cur != null) {
            path.add(cur);
            cur = visited.get(cur);
        }
        Collections.reverse(path);
        return path;
    }
}`,
expl:`BFS гарантирует кратчайший путь в невзвешенном графе. Очередь FIFO обрабатывает сначала ближайших. Восстановление пути через карту родителей.`},

{id:"dp1",t:"Longest Palindromic Substring (5)",p:"Dynamic Prog.",d:"средне",
desc:`Дана строка s. Найти самую длинную подстроку-палиндром.

Пример:
Ввод: s = "babad"
Вывод: "bab" (или "aba")`,
hint:"Expand around center: для каждого символа (и пары) расширяйся влево-вправо пока совпадает.",
code:`class Solution {
    public String longestPalindrome(String s) {
        int start = 0, maxLen = 0;
        for (int i = 0; i < s.length(); i++) {
            int len1 = expand(s, i, i);     // нечётный
            int len2 = expand(s, i, i + 1); // чётный
            int len = Math.max(len1, len2);
            if (len > maxLen) {
                maxLen = len;
                start = i - (len - 1) / 2;
            }
        }
        return s.substring(start, start + maxLen);
    }

    int expand(String s, int l, int r) {
        while (l >= 0 && r < s.length()
               && s.charAt(l) == s.charAt(r)) {
            l--; r++;
        }
        return r - l - 1;
    }
}`,
expl:`O(n²) время, O(1) память. Для каждого центра расширяемся пока символы совпадают.`}
];

const patterns={};
P.forEach(p=>{if(!patterns[p.p])patterns[p.p]=[];patterns[p.p].push(p)});
const patNames=Object.keys(patterns);
let curPat=null;

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('active',['patterns','quiz','cards'][i]===id)});
  if(id==='quiz')initQuiz();
  if(id==='cards')initCards();
}

function renderPatterns(){
  document.getElementById('patternsGrid').innerHTML=patNames.map(name=>`
    <div class="pcard" onclick="openPattern('${name}')">
      <div class="name">${name}</div>
      <div class="cnt">${patterns[name].length} задач</div>
    </div>`).join('');
}
function openPattern(name){
  curPat=name;
  document.getElementById('pdTitle').textContent=name;
  document.getElementById('pdList').innerHTML=patterns[name].map(p=>`
    <div class="problem-card" onclick="openProblem('${p.id}','patternDetail')">
      <div class="title">${p.d==='легко'?'🟢':p.d==='средне'?'🟡':'🔴'} ${p.t}</div>
      <div class="diff">${p.d}</div>
    </div>`).join('');
  showScreen('patternDetail');
}
function openProblem(id,from){
  const p=P.find(x=>x.id===id);
  document.getElementById('pdBack').onclick=()=>showScreen(from);
  document.getElementById('probTitle').textContent=p.t;
  document.getElementById('probContent').innerHTML=`
    <span class="tag" style="background:${p.d==='легко'?'#22c55e30;color:#22c55e':p.d==='средне'?'#f59e0b30;color:#f59e0b':'#ef444430;color:#ef4444'}">${p.d}</span>
    <span class="tag" style="background:#7c3aed30;color:#7c3aed;margin-left:4px">${p.p}</span>
    <div class="detail-section"><h3>📝 Условие</h3><div class="body">${esc(p.desc)}</div></div>
    <button class="spoiler-btn" onclick="this.nextElementSibling.style.display='block';this.style.display='none'">💡 Показать подсказку</button>
    <div class="detail-section" style="display:none"><h3>💡 Подсказка</h3><div class="body">${esc(p.hint)}</div></div>
    <button class="spoiler-btn" onclick="this.nextElementSibling.style.display='block';this.style.display='none'">👨‍💻 Показать решение</button>
    <div class="detail-section" style="display:none"><h3>👨‍💻 Код</h3><pre>${esc(p.code)}</pre></div>
    <button class="spoiler-btn" onclick="this.nextElementSibling.style.display='block';this.style.display='none'">🧠 Показать объяснение</button>
    <div class="detail-section" style="display:none"><h3>🧠 Объяснение</h3><div class="body">${esc(p.expl)}</div></div>`;
  showScreen('problemDetail');
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// QUIZ
let qIdx=0,qList=[],qAnswered=false,qScore=0,qTotal=5;
function initQuiz(){
  qIdx=0;qScore=0;qList=shuffle([...P]).slice(0,qTotal);
  document.getElementById('quizArea').innerHTML=`
    <p style="color:var(--dim);margin-bottom:12px">Прочитай условие — угадай паттерн</p>
    <button class="big-btn" onclick="nextQ()">Начать</button>`;
}
function nextQ(){
  if(qIdx>=qTotal){
    document.getElementById('quizArea').innerHTML=`
      <div style="text-align:center;margin-top:40px">
        <div style="font-size:48px">${qScore>=4?'⭐':'🔄'}</div>
        <h2 style="margin:12px 0">${qScore} из ${qTotal}</h2>
        <button class="big-btn" onclick="initQuiz()">Ещё раз</button>
      </div>`;return;
  }
  qAnswered=false;
  const p=qList[qIdx],correct=p.p;
  let opts=patNames.filter(n=>n!==correct);
  opts=shuffle(opts).slice(0,3).concat(correct);
  opts=shuffle(opts);
  document.getElementById('quizArea').innerHTML=`
    <div class="counter">${qIdx+1} / ${qTotal}</div>
    <div class="progress-bar"><div class="fill" style="width:${qIdx/qTotal*100}%"></div></div>
    <div class="detail-section"><strong>${p.t}</strong><div class="body" style="margin-top:8px">${esc(p.desc)}</div></div>
    <p style="font-weight:600;margin:8px 0">Какой паттерн?</p>
    ${opts.map(o=>`<div class="quiz-option" data-v="${o}" onclick="pickAnswer(this,'${o===correct}')">${o}</div>`).join('')}`;
}
function pickAnswer(el,isCorrectStr){
  if(qAnswered)return;qAnswered=true;
  const isCorrect=isCorrectStr==='true';
  const correct=qList[qIdx].p;
  document.querySelectorAll('.quiz-option').forEach(o=>{
    if(o.dataset.v===correct)o.classList.add('correct');
    else if(o===el)o.classList.add('wrong');
  });
  if(isCorrect)qScore++;
  qIdx++;
  setTimeout(nextQ,1200);
}

// FLASHCARDS
let fcIdx=0,fcFlipped=false,fcList=[];
function initCards(){fcList=shuffle([...P]);fcIdx=0;fcFlipped=false;renderCard()}
function renderCard(){
  const p=fcList[fcIdx];
  document.getElementById('cardsArea').innerHTML=`
    <div class="counter">${fcIdx+1} / ${fcList.length}</div>
    <div class="flashcard${fcFlipped?' flipped':''}" onclick="flipCard()">
      <div class="fc-face">
        <span class="tag" style="background:#7c3aed30;color:#7c3aed">${p.d}</span>
        <h3 style="margin:12px 0">${esc(p.t)}</h3>
        <div style="white-space:pre-wrap;font-size:14px;line-height:1.6">${esc(p.desc)}</div>
        <div style="text-align:center;color:var(--dim);margin-top:16px;font-size:13px">нажми чтобы перевернуть →</div>
      </div>
      <div class="fc-face fc-back">
        <span class="tag" style="background:#7c3aed30;color:#7c3aed">${esc(p.p)}</span>
        <div style="margin:10px 0;color:var(--orange);font-size:14px;white-space:pre-wrap">${esc(p.hint)}</div>
        <pre style="font-size:11px;background:var(--card2);padding:12px;border-radius:10px;overflow-x:auto;line-height:1.5">${esc(p.code)}</pre>
        <div style="margin-top:10px;font-size:13px;color:var(--dim);white-space:pre-wrap">${esc(p.expl)}</div>
      </div>
    </div>
    <div class="fc-nav">
      <button onclick="fcPrev()">←</button>
      <button onclick="fcShuffle()">🔀</button>
      <button onclick="fcNext()">→</button>
    </div>`;
}
function flipCard(){fcFlipped=!fcFlipped;renderCard()}
function fcNext(){fcFlipped=false;fcIdx=(fcIdx+1)%fcList.length;renderCard()}
function fcPrev(){fcFlipped=false;fcIdx=(fcIdx-1+fcList.length)%fcList.length;renderCard()}
function fcShuffle(){fcFlipped=false;fcList=shuffle([...P]);fcIdx=0;renderCard()}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

renderPatterns();
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');
</script>
